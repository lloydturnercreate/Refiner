name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14   # Apple Silicon (M1/M2/M3/M4)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build
        run: python3 build.py

      - name: Ad-hoc sign app bundle
        run: codesign --deep --force --sign - dist/Refiner.app

      - name: Zip app bundle
        run: |
          cd dist
          zip -r Refiner-macOS.zip Refiner.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Refiner-macOS
          path: dist/Refiner-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build
        run: python build.py

      - name: Zip executable
        run: Compress-Archive -Path dist\Refiner.exe -DestinationPath dist\Refiner-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Refiner-Windows
          path: dist/Refiner-Windows.zip

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Refiner-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Refiner-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Refiner ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            Refiner-macOS.zip
            Refiner-Windows.zip
          body: |
            ## Refiner ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon — M1/M2/M3/M4) | `Refiner-macOS.zip` |
            | Windows | `Refiner-Windows.zip` |

            **No additional software required.** FFmpeg is bundled inside the app.

            ### Installing on macOS
            1. Download `Refiner-macOS.zip` and unzip it
            2. Move `Refiner.app` to your Applications folder
            3. **Right-click → Open** (first launch only — macOS flags apps from independent developers)
            4. Click **Open** in the dialog that appears
            5. From then on, double-click opens it normally

            ### Installing on Windows
            1. Download `Refiner-Windows.zip` and unzip it
            2. Double-click `Refiner.exe` to run
