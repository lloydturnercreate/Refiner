name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build-macos-arm:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14   # Apple Silicon (M1/M2/M3)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: brew install ffmpeg pngquant

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build
        run: python3 build.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r Refiner-macOS-AppleSilicon.zip Refiner.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Refiner-macOS-AppleSilicon
          path: dist/Refiner-macOS-AppleSilicon.zip

  build-macos-intel:
    name: Build macOS (Intel)
    runs-on: macos-13   # Intel x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: brew install ffmpeg pngquant

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build
        run: python3 build.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r Refiner-macOS-Intel.zip Refiner.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Refiner-macOS-Intel
          path: dist/Refiner-macOS-Intel.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build
        run: python build.py

      - name: Zip executable
        run: Compress-Archive -Path dist\Refiner.exe -DestinationPath dist\Refiner-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Refiner-Windows
          path: dist/Refiner-Windows.zip

  release:
    name: Create GitHub Release
    needs: [build-macos-arm, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: Refiner-macOS-AppleSilicon

      - name: Download Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: Refiner-macOS-Intel

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Refiner-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Refiner ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            Refiner-macOS-AppleSilicon.zip
            Refiner-macOS-Intel.zip
            Refiner-Windows.zip
          body: |
            ## Refiner ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS — M1/M2/M3/M4 (Apple Silicon) | `Refiner-macOS-AppleSilicon.zip` |
            | macOS — older Intel Mac | `Refiner-macOS-Intel.zip` |
            | Windows | `Refiner-Windows.zip` — extract and run `Refiner.exe` |

            Not sure which Mac you have? Apple menu → About This Mac. If it says **Apple M1/M2/M3/M4**, download Apple Silicon. If it says **Intel**, download Intel.

            ### First Launch (macOS)
            macOS will warn the app is from an unidentified developer. **Right-click → Open** to bypass this once.

            ### Requirements

            Users need the following installed on their machine:
            - **FFmpeg** (required for video operations)
              - macOS: `brew install ffmpeg`
              - Windows: [ffmpeg.org](https://ffmpeg.org/download.html) or `choco install ffmpeg`
            - **pngquant** (optional, better PNG compression)
              - macOS: `brew install pngquant`
              - Windows: [pngquant.org](https://pngquant.org/) or `choco install pngquant`
